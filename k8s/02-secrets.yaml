apiVersion: v1
kind: Secret
metadata:
  name: splitease-secrets
  namespace: splitease
type: Opaque
# stringData is plain text — Kubernetes base64-encodes it automatically.
# Change these values before any real deployment.
stringData:
  SECRET_KEY: "dev-secret-key-change-in-production-32chars!!"
  POSTGRES_USER: "splitease"
  POSTGRES_PASSWORD: "password"
  POSTGRES_DB: "splitease"
  SMTP_PASSWORD: ""
  VAPID_PRIVATE_KEY: ""
  VAPID_PUBLIC_KEY: ""
