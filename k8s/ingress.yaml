apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: splitease-ingress
  namespace: splitease
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
spec:
  ingressClassName: nginx
  rules:
    - host: splitease.local
      http:
        paths:
          # All /api/* traffic goes to the API gateway (keeps /api prefix)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000
          # Everything else goes to the React SPA
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
